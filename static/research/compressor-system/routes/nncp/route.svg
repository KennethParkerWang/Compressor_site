<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360"><defs><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#66788c"/></marker><style>.t{font:700 17px Inter,'Noto Sans SC',sans-serif;fill:#162232}.s{font:500 12px Inter,'Noto Sans SC',sans-serif;fill:#56677a}.m{font:700 10px ui-monospace,monospace;fill:#718096}.l{stroke:#66788c;stroke-width:2;marker-end:url(#a)}</style></defs><rect width="1280" height="360" fill="#fff"/><text x="48" y="45" class="m">NNCP TRANSFORMER PROBABILITY MODEL + ARITHMETIC CODING</text><rect x="48" y="82" width="170" height="90" fill="#f3f6f9" stroke="#b9c6d5"/><text x="133" y="118" text-anchor="middle" class="t">Byte history</text><text x="133" y="145" text-anchor="middle" class="s">decoded prefix</text><line x1="218" y1="127" x2="268" y2="127" class="l"/><rect x="268" y="70" width="220" height="114" fill="#f4eef7" stroke="#a487b5"/><text x="378" y="108" text-anchor="middle" class="t">Transformer</text><text x="378" y="135" text-anchor="middle" class="s">autoregressive prediction</text><text x="378" y="157" text-anchor="middle" class="s">model state / online update</text><line x1="488" y1="127" x2="538" y2="127" class="l"/><rect x="538" y="82" width="190" height="90" fill="#f2f5ea" stroke="#91a76b"/><text x="633" y="118" text-anchor="middle" class="t">256-way distribution</text><text x="633" y="145" text-anchor="middle" class="s">quantized integer CDF</text><line x1="728" y1="127" x2="778" y2="127" class="l"/><rect x="778" y="82" width="190" height="90" fill="#f7f2e9" stroke="#b89359"/><text x="873" y="118" text-anchor="middle" class="t">Arithmetic coder</text><text x="873" y="145" text-anchor="middle" class="s">encode actual byte</text><line x1="968" y1="127" x2="1018" y2="127" class="l"/><rect x="1018" y="82" width="210" height="90" fill="#eef5fb" stroke="#7aa4c8"/><text x="1123" y="118" text-anchor="middle" class="t">Bitstream</text><text x="1123" y="145" text-anchor="middle" class="s">plus model contract</text><path d="M1123 172V235H378V184" fill="none" stroke="#9a6a22" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#a)"/><text x="750" y="263" text-anchor="middle" class="t">Decoder repeats the same prediction before decoding each byte</text><text x="750" y="288" text-anchor="middle" class="s">architecture · initialization · CDF quantization · optimizer · precision · update order must match</text></svg>

