<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360"><defs><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#66788c"/></marker><style>.t{font:700 17px Inter,'Noto Sans SC',sans-serif;fill:#162232}.s{font:500 12px Inter,'Noto Sans SC',sans-serif;fill:#56677a}.m{font:700 10px ui-monospace,monospace;fill:#718096}.l{stroke:#66788c;stroke-width:2;marker-end:url(#a)}</style></defs><rect width="1280" height="360" fill="#fff"/><text x="48" y="45" class="m">xz CONTAINER + FILTER CHAIN + LZMA2</text><rect x="48" y="82" width="180" height="90" fill="#f3f6f9" stroke="#b9c6d5"/><text x="138" y="118" text-anchor="middle" class="t">Stream Header</text><text x="138" y="145" text-anchor="middle" class="s">magic · flags · check</text><line x1="228" y1="127" x2="278" y2="127" class="l"/><rect x="278" y="70" width="210" height="114" fill="#eef5fb" stroke="#7aa4c8"/><text x="383" y="108" text-anchor="middle" class="t">xz Block</text><text x="383" y="135" text-anchor="middle" class="s">header + compressed data</text><text x="383" y="157" text-anchor="middle" class="s">filter chain properties</text><line x1="488" y1="127" x2="538" y2="127" class="l"/><rect x="538" y="82" width="190" height="90" fill="#edf6f4" stroke="#73a89e"/><text x="633" y="118" text-anchor="middle" class="t">Optional filters</text><text x="633" y="145" text-anchor="middle" class="s">BCJ / Delta</text><line x1="728" y1="127" x2="778" y2="127" class="l"/><rect x="778" y="70" width="200" height="114" fill="#f2f5ea" stroke="#91a76b"/><text x="878" y="108" text-anchor="middle" class="t">LZMA2</text><text x="878" y="135" text-anchor="middle" class="s">dictionary parse</text><text x="878" y="157" text-anchor="middle" class="s">probability + range coder</text><line x1="978" y1="127" x2="1028" y2="127" class="l"/><rect x="1028" y="82" width="200" height="90" fill="#f7f2e9" stroke="#b89359"/><text x="1128" y="118" text-anchor="middle" class="t">Index + Footer</text><text x="1128" y="145" text-anchor="middle" class="s">records · backward size</text><rect x="278" y="232" width="700" height="70" fill="#f5f7fa" stroke="#cbd5df" stroke-dasharray="6 5"/><text x="628" y="260" text-anchor="middle" class="t">Layer distinction</text><text x="628" y="285" text-anchor="middle" class="s">xz is the container; LZMA2 is commonly the final compression filter</text></svg>

