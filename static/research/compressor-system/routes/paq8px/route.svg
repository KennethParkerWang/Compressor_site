roke="#a487b5"/><text x="1128" y="118" text-anchor="middle" class="t">Arithmetic-family</text><text x="1128" y="145" text-anchor="middle" class="s">bitstream coder</text><rect x="278" y="232" width="700" height="70" fill="#f5f7fa" stroke="#cbd5df" stroke-dasharray="6 5"/><text x="628" y="260" text-anchor="middle" class="t">Decoder synchronization</text><text x="628" y="285" text-anchor="middle" class="s">predict → decode bit → update every model and mixer in the same order</text></svg>

